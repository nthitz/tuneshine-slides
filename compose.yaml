services:
  tuneshine-dashboard:
    build: .
    container_name: tuneshine-dashboard
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
    volumes:
      - ./gallery:/app/gallery:ro
      - ./.cache:/app/.cache
      - ./slides:/app/slides
